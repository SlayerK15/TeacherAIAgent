<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Teacher</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --panel-2: #0b1220;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #4f8cff;
      --accent-2: #38bdf8;
      --ok: #22c55e;
      --err: #ef4444;
      --warn: #eab308;
      --border: #334155;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      line-height: 1.5;
    }
    .wrap { max-width: 980px; margin: 0 auto; padding: 2.5em 1.5em 4em; }
    h1 { margin: 0 0 0.2em; font-size: 1.8em; letter-spacing: -0.02em; }
    .sub { color: var(--muted); margin-bottom: 1.8em; }
    .card {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 14px; padding: 1.4em; margin-bottom: 1.2em;
    }
    label { display: block; font-weight: 600; font-size: 0.92em; margin-bottom: 0.4em; color: var(--text); }
    .hint { color: var(--muted); font-weight: 400; font-size: 0.85em; }
    textarea, input[type=number], input[type=file] {
      width: 100%; background: var(--panel-2); color: var(--text);
      border: 1px solid var(--border); border-radius: 8px; padding: 0.65em 0.8em;
      font-family: inherit; font-size: 1em;
    }
    textarea { min-height: 90px; resize: vertical; }
    textarea:focus, input:focus { outline: none; border-color: var(--accent); }

    .row { display: flex; gap: 1em; flex-wrap: wrap; }
    .row > * { flex: 1; min-width: 160px; }

    .tabs { display: flex; gap: 0.4em; margin-bottom: 0.8em; }
    .tab {
      padding: 0.45em 1em; border-radius: 8px; cursor: pointer; font-size: 0.9em;
      background: var(--panel-2); color: var(--muted); border: 1px solid var(--border);
      user-select: none;
    }
    .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    .checkbox-row { display: flex; align-items: center; gap: 0.5em; margin-top: 0.6em; font-weight: 500; }
    .checkbox-row input { width: auto; margin: 0; }

    button.primary {
      background: var(--accent); color: #fff; border: none; padding: 0.75em 1.6em;
      font-size: 1em; font-weight: 600; border-radius: 8px; cursor: pointer;
      transition: background 0.15s;
    }
    button.primary:hover:not(:disabled) { background: #3b78f0; }
    button.primary:disabled { background: #334155; color: var(--muted); cursor: not-allowed; }
    button.ghost {
      background: transparent; color: var(--muted); border: 1px solid var(--border);
      padding: 0.4em 0.9em; font-size: 0.85em; border-radius: 6px; cursor: pointer;
    }
    button.ghost:hover { color: var(--text); border-color: var(--accent); }

    #status { font-size: 0.95em; min-height: 1.4em; }
    #status .ok { color: var(--ok); }
    #status .err { color: var(--err); }
    .loader {
      display: inline-block; width: 14px; height: 14px; border-radius: 50%;
      border: 2px solid var(--border); border-top-color: var(--accent);
      animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 0.4em;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    video {
      width: 100%; border-radius: 10px; background: #000; display: block;
    }
    .video-actions { margin-top: 0.8em; display: flex; gap: 0.6em; flex-wrap: wrap; }

    details { margin-top: 0.8em; }
    details summary {
      cursor: pointer; color: var(--muted); font-size: 0.9em; padding: 0.4em 0;
      user-select: none;
    }
    details summary:hover { color: var(--text); }
    pre {
      background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px;
      padding: 0.8em; overflow: auto; max-height: 360px; font-size: 0.82em;
      color: var(--text); white-space: pre-wrap; word-break: break-word;
    }

    #logBox {
      background: #050b18; border: 1px solid var(--border); border-radius: 8px;
      padding: 0.8em; max-height: 280px; overflow-y: auto;
      font-family: ui-monospace, Consolas, monospace; font-size: 11.5px;
      white-space: pre-wrap; line-height: 1.45;
    }
    .log-INFO { color: #79c0ff; }
    .log-WARNING { color: var(--warn); }
    .log-ERROR { color: var(--err); }
    .log-time { color: #6e7681; margin-right: 0.4em; }

    .clarify-block { margin-top: 0.8em; }
    .clarify-block textarea { min-height: 60px; }
    .answer { background: var(--panel-2); border-left: 3px solid var(--accent);
              padding: 0.8em; border-radius: 6px; margin-top: 0.6em; white-space: pre-wrap; }

    .hidden { display: none !important; }
    .hero {background: linear-gradient(135deg,#111827,#0f172a 40%,#1d4ed8 140%);border:1px solid var(--border);padding:1em 1.2em;border-radius:14px;margin-bottom:1.1em;}
    .kpi{display:inline-block;background:#0b1220;border:1px solid var(--border);padding:.35em .6em;border-radius:999px;margin-right:.4em;color:var(--muted);font-size:.8em;}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero"><h1>AI Teacher Studio</h1>
    <p class="sub">Generate explainers, storyboard visuals, and classroom-ready videos from text or audio prompts.</p><span class="kpi">Multi-Agent</span><span class="kpi">Visual Intelligence</span><span class="kpi">FastAPI + Dashboard</span></div>

    <div class="card">
      <form id="teachForm" autocomplete="off">
        <div class="tabs" role="tablist">
          <div class="tab active" data-mode="text" role="tab">Text prompt</div>
          <div class="tab" data-mode="audio" role="tab">Audio file</div>
        </div>

        <div id="textPane">
          <label for="prompt">Question or lesson topic</label>
          <textarea id="prompt" placeholder="E.g., Teach me about Newton's three laws of motion"></textarea>
        </div>

        <div id="audioPane" class="hidden">
          <label for="audio">Audio file <span class="hint">(wav / mp3 / m4a)</span></label>
          <input id="audio" type="file" accept="audio/*">
        </div>

        <div class="row" style="margin-top: 0.6em;">
          <div>
            <label for="videoLength">Video length <span class="hint">(minutes)</span></label>
            <input id="videoLength" type="number" min="1" max="30" value="2" required>
          </div>
          <div>
            <label for="sessionId">Session ID <span class="hint">(for follow-ups)</span></label>
            <input id="sessionId" type="text" value="default" style="background: var(--panel-2); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 0.65em 0.8em; width: 100%; font-size: 1em;">
          </div>
        </div>

        <label class="checkbox-row">
          <input id="animated" type="checkbox" checked>
          Animated mode <span class="hint">(illustrations + Ken-Burns + overlay text)</span>
        </label>
        <label class="checkbox-row">
          <input id="silent" type="checkbox">
          Silent <span class="hint">(skip TTS — visual only)</span>
        </label>

        <div style="margin-top: 1.2em;">
          <button type="submit" id="submitBtn" class="primary">Generate lesson</button>
        </div>
      </form>
    </div>

    <div id="status" class="card hidden"></div>

    <div id="videoCard" class="card hidden">
      <video id="player" controls preload="metadata"></video>
      <div class="video-actions">
        <a id="downloadBtn" class="primary" style="text-decoration:none; padding: 0.55em 1.1em; font-size: 0.9em;" download>Download MP4</a>
        <a id="responseBtn" class="ghost" target="_blank">View response.txt</a>
        <a id="logBtn" class="ghost" target="_blank">View log</a>
      </div>
      <details>
        <summary>Transcript</summary>
        <pre id="transcript"></pre>
      </details>
      <details>
        <summary>Pipeline output (topics, lessons)</summary>
        <pre id="pipelineDump"></pre>
      </details>
    </div>


    <div id="logCard" class="card hidden">
      <label style="margin-bottom: 0.6em;">Live log</label>
      <div id="logBox"></div>
    </div>

    <div id="clarifyCard" class="card hidden">
      <label>Follow-up question</label>
      <select id="clarifyTopic" style="width:100%;background:var(--panel-2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:0.65em 0.8em;font-size:1em;margin-bottom:0.5em;"></select>
      <textarea id="clarifyQ" class="clarify-block" placeholder="Ask anything about the lesson..."></textarea>
      <button id="clarifyBtn" class="primary" style="margin-top:0.5em;">Ask</button>
      <div id="clarifyAnswer"></div>
    </div>
  </div>

  <script>
    // Same-origin when served by FastAPI (opening http://127.0.0.1:8000/ hits this
    // page directly via the `/` route in api.py). Falling back to a fixed origin
    // only matters when opened via file://, which we don't actually support but
    // keep working for quick dev edits.
    const API_BASE = (location.protocol === 'http:' || location.protocol === 'https:')
      ? location.origin
      : 'http://127.0.0.1:8000';

    const $ = (id) => document.getElementById(id);
    const tabs = document.querySelectorAll('.tab');
    let inputMode = 'text';
    let lastResult = null;

    tabs.forEach(t => t.addEventListener('click', () => {
      tabs.forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      inputMode = t.dataset.mode;
      $('textPane').classList.toggle('hidden', inputMode !== 'text');
      $('audioPane').classList.toggle('hidden', inputMode !== 'audio');
    }));

    function setStatus(html, kind = '') {
      const s = $('status');
      s.classList.remove('hidden');
      s.innerHTML = kind === 'busy'
        ? `<span class="loader"></span> ${html}`
        : `<span class="${kind}">${html}</span>`;
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
    }

    function predictSessionTs() {
      const d = new Date();
      const z = (n) => String(n).padStart(2, '0');
      return `${d.getFullYear()}${z(d.getMonth()+1)}${z(d.getDate())}_${z(d.getHours())}${z(d.getMinutes())}`;
    }
    function slugFor(text) {
      return (text || 'unknown').replace(/\W+/g, '_').slice(0, 32);
    }

    async function findLatestSession(slug, sinceTs) {
      try {
        const r = await fetch(`${API_BASE}/sessions?limit=15`);
        if (!r.ok) return null;
        const { sessions } = await r.json();
        for (const s of sessions) {
          const [ts, ...rest] = s.split('__');
          if (rest.join('__') === slug && ts >= sinceTs) return s;
        }
      } catch (e) {}
      return null;
    }

    let pollTimer = null;
    let logOffset = 0;
    let trackedSession = null;

    function startTail(slug, sinceTs) {
      $('logCard').classList.remove('hidden');
      $('logBox').innerHTML = '';
      logOffset = 0;
      trackedSession = null;

      const tick = async () => {
        if (!trackedSession) trackedSession = await findLatestSession(slug, sinceTs);
        if (!trackedSession) return;
        try {
          const r = await fetch(`${API_BASE}/log_tail/${encodeURIComponent(trackedSession)}?after=${logOffset}`);
          if (!r.ok) return;
          const j = await r.json();
          logOffset = j.next_offset;
          (j.lines || []).forEach(renderLog);
        } catch (e) {}
      };
      pollTimer = setInterval(tick, 1200);
      tick();
    }
    function stopTail() {
      if (pollTimer) clearInterval(pollTimer);
      pollTimer = null;
    }
    function renderLog(line) {
      const lvl = (line.level || 'INFO').toUpperCase();
      const t = (line.ts || '').slice(11, 19);
      const data = line.data && Object.keys(line.data).length
        ? ' ' + JSON.stringify(line.data) : '';
      const div = document.createElement('div');
      div.className = `log-${lvl}`;
      div.innerHTML = `<span class="log-time">${t}</span>[${lvl}] ${escapeHtml(line.msg || '')}${escapeHtml(data)}`;
      const box = $('logBox');
      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
    }

    function fillClarifyTopics(lessons) {
      const sel = $('clarifyTopic');
      sel.innerHTML = '';
      Object.keys(lessons || {}).forEach(t => {
        const opt = document.createElement('option');
        opt.value = t; opt.textContent = t;
        sel.appendChild(opt);
      });
    }

    function renderResult(data) {
      lastResult = data;
      $('videoCard').classList.remove('hidden');

      const absUrl = data.video_url && data.video_url.startsWith('/') ? API_BASE + data.video_url : data.video_url;
      const player = $('player');
      if (absUrl) {
        player.src = absUrl;
        player.load();
        $('downloadBtn').href = absUrl;
        $('downloadBtn').classList.remove('hidden');
      } else {
        player.removeAttribute('src');
        $('downloadBtn').classList.add('hidden');
      }

      if (data.responce_txt_url) {
        $('responseBtn').href = API_BASE + data.responce_txt_url;
        $('responseBtn').classList.remove('hidden');
      } else $('responseBtn').classList.add('hidden');

      if (data.log_url) {
        $('logBtn').href = API_BASE + data.log_url;
        $('logBtn').classList.remove('hidden');
      } else $('logBtn').classList.add('hidden');

      $('transcript').textContent = data.video_script || '(no transcript)';
      $('pipelineDump').textContent = JSON.stringify({
        topic_tiers: data.topic_tiers,
        simplified_steps: data.simplified_steps,
        lessons: data.lessons,
      }, null, 2);

      if (data.lessons && Object.keys(data.lessons).length) {
        fillClarifyTopics(data.lessons);
        $('clarifyCard').classList.remove('hidden');
      }
    }

    $('teachForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = $('submitBtn');
      if (btn.disabled) return;

      const formData = new FormData();
      const sessionId = $('sessionId').value || 'default';
      const animated = $('animated').checked;
      const silent = $('silent').checked;
      const minutes = $('videoLength').value;
      let slug = 'unknown';

      if (inputMode === 'text') {
        const prompt = $('prompt').value.trim();
        if (!prompt) { setStatus('Enter a prompt or switch to audio mode.', 'err'); return; }
        formData.append('user_prompt', prompt);
        slug = slugFor(prompt);
      } else {
        const file = $('audio').files[0];
        if (!file) { setStatus('Pick an audio file.', 'err'); return; }
        formData.append('audio', file);
        slug = slugFor(file.name);
      }
      formData.append('video_minutes', minutes);
      formData.append('session_id', sessionId);
      formData.append('animated', animated ? 'true' : 'false');
      formData.append('silent', silent ? 'true' : 'false');

      btn.disabled = true;
      $('videoCard').classList.add('hidden');
      $('clarifyCard').classList.add('hidden');
      setStatus('Generating lesson and video... this can take a few minutes.', 'busy');

      const sinceTs = predictSessionTs();
      startTail(slug, sinceTs);

      try {
        const r = await fetch(`${API_BASE}/teach`, { method: 'POST', body: formData });
        const data = await r.json();
        if (!r.ok) throw new Error(data.error || `HTTP ${r.status}`);
        setStatus('Video lesson ready.', 'ok');
        renderResult(data);
      } catch (err) {
        setStatus('Error: ' + err.message, 'err');
        console.error(err);
      } finally {
        stopTail();
        btn.disabled = false;
      }
    });

    $('clarifyBtn').addEventListener('click', async () => {
      const q = $('clarifyQ').value.trim();
      const topic = $('clarifyTopic').value;
      if (!q || !topic) return;
      const ans = $('clarifyAnswer');
      ans.innerHTML = '<div class="loader"></div> Thinking...';

      const fd = new FormData();
      fd.append('user_question', q);
      fd.append('topic', topic);
      fd.append('session_id', $('sessionId').value || 'default');
      try {
        const r = await fetch(`${API_BASE}/clarify`, { method: 'POST', body: fd });
        const j = await r.json();
        if (!r.ok) throw new Error(j.error || 'API error');
        ans.innerHTML = `<div class="answer">${escapeHtml(j.answer || '(no answer)')}</div>`;
      } catch (err) {
        ans.innerHTML = `<div class="answer" style="border-left-color:var(--err);">Error: ${escapeHtml(err.message)}</div>`;
      }
    });

    
        const data = await r.json();
        $('visualDump').textContent = JSON.stringify(data, null, 2);
      } catch (e) {
        $('visualDump').textContent = `Visual plan request failed: ${e}`;
      }
    });

  </script>
</body>
</html>
